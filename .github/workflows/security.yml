name: Security Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:
  # =========================================================================
  # Python Security Scan
  # =========================================================================
  python-security:
    name: Python Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install bandit safety pip-audit
          pip install -e ".[dev]"

      - name: Run Bandit
        run: bandit -r engine/ -f json -o bandit-report.json || true

      - name: Run Safety Check
        run: safety check --json --output safety-report.json || true

      - name: Run pip-audit
        run: pip-audit --format=json --output=pip-audit-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        with:
          name: python-security-reports
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.json
          retention-days: 30

  # =========================================================================
  # Rust Security Scan
  # =========================================================================
  rust-security:
    name: Rust Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: |
          cd rust
          cargo audit --json > cargo-audit-report.json || true

      - name: Upload Rust security report
        uses: actions/upload-artifact@v7
        with:
          name: rust-security-reports
          path: rust/cargo-audit-report.json
          retention-days: 30

  # =========================================================================
  # Container Image Scan
  # =========================================================================
  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --target production -t kiro-v3:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kiro-v3:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy (JSON output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'kiro-v3:scan'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v7
        with:
          name: container-security-reports
          path: |
            trivy-results.sarif
            trivy-results.json
          retention-days: 30

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # =========================================================================
  # Secret Scanning
  # =========================================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # =========================================================================
  # Snyk Scan
  # =========================================================================
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snyk
        run: npm install -g snyk

      - name: Run Snyk test (Python)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          pip install -e ".[dev]"
          snyk test --file=pyproject.toml --json-file-output=snyk-python.json || true
        continue-on-error: true

      - name: Run Snyk test (Rust)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          cd rust
          snyk test --file=Cargo.toml --json-file-output=../snyk-rust.json || true
        continue-on-error: true

      - name: Upload Snyk reports
        uses: actions/upload-artifact@v7
        with:
          name: snyk-reports
          path: |
            snyk-python.json
            snyk-rust.json
          retention-days: 30

  # =========================================================================
  # Dependency Review
  # =========================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, ISC
          deny-licenses: GPL-2.0, GPL-3.0

  # =========================================================================
  # CodeQL Analysis
  # =========================================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, rust
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python,rust"