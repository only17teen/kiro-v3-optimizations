name: Kiro v3.0 CI/CD

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  PYTHON_VERSION: '3.11'
  RUST_VERSION: '1.78'

jobs:
  # =========================================================================
  # Lint and Format Checks
  # =========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install Python dependencies
        run: |
          pip install black ruff mypy pytest pytest-asyncio

      - name: Check Python formatting (black)
        run: black --check --diff engine/ tests/ examples/

      - name: Run Python linter (ruff)
        run: ruff check engine/ tests/ examples/

      - name: Run Python type checker (mypy)
        run: mypy engine/ --ignore-missing-imports

      - name: Check Rust formatting
        run: cd rust && cargo fmt -- --check

      - name: Run Rust linter (clippy)
        run: cd rust && cargo clippy -- -D warnings

  # =========================================================================
  # Rust Build & Test
  # =========================================================================
  rust-build:
    name: Rust FFI Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Rust library
        run: cd rust && cargo build --release

      - name: Run Rust tests
        run: cd rust && cargo test --release

      - name: Upload Rust artifact
        uses: actions/upload-artifact@v7
        with:
          name: rust-ffi
          path: rust/target/release/libkiro_actor.so
          retention-days: 7

  # =========================================================================
  # Python Tests
  # =========================================================================
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v -m "not slow and not integration and not gpu" --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Generate coverage report
        run: pytest tests/ --cov=engine --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: python-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 7

  # =========================================================================
  # Docker Build
  # =========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-build, python-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download Rust artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-ffi
          path: rust/target/release/

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kiro-v3:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

      - name: Test Docker image
        run: |
          docker run --rm kiro-v3:latest python -c "
            import engine
            from engine.actor import ActorSystem
            print('Docker image OK')
          "

  # =========================================================================
  # Benchmarks
  # =========================================================================
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: python-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest-benchmark

      - name: Run benchmarks
        run: pytest tests/ -m benchmark --benchmark-only --benchmark-json=benchmark.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 30

  # =========================================================================
  # Release
  # =========================================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [docker-build, benchmark]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: pip install build twine

      - name: Build Python package
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}