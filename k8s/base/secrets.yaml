apiVersion: v1
kind: Secret
metadata:
  name: kiro-v3-secrets
  namespace: kiro-v3
type: Opaque
stringData:
  # JWT Secret (rotate via external secret manager)
  JWT_SECRET: "change-me-in-production"
  
  # API Keys (if needed for external LLM services)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  
  # Database credentials (if using external DB)
  DB_HOST: ""
  DB_PORT: "5432"
  DB_USER: ""
  DB_PASSWORD: ""
  DB_NAME: ""
  
  # Redis credentials (if using external Redis)
  REDIS_HOST: ""
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
  
  # S3/MinIO credentials for checkpoints
  S3_ENDPOINT: ""
  S3_ACCESS_KEY: ""
  S3_SECRET_KEY: ""
  S3_BUCKET: "kiro-v3-checkpoints"
  
  # Alert webhooks
  ALERT_WEBHOOK_URL: ""
  PAGERDUTY_KEY: ""
  
  # PyPI token for releases (CI/CD only)
  PYPI_API_TOKEN: ""
  
  # GitHub token for releases (CI/CD only)
  GITHUB_TOKEN: ""
---
