apiVersion: v1
kind: ServiceAccount
metadata:
  name: kiro-v3
  namespace: kiro-v3
  annotations:
    # For AWS IRSA (IAM Roles for Service Accounts)
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/kiro-v3-role
    # For GCP Workload Identity
    # iam.gke.io/gcp-service-account: kiro-v3@project.iam.gserviceaccount.com
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kiro-v3
  namespace: kiro-v3
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kiro-v3
  namespace: kiro-v3
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kiro-v3
subjects:
  - kind: ServiceAccount
    name: kiro-v3
    namespace: kiro-v3
---
# Network Policy - restrict pod-to-pod communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kiro-v3-default-deny
  namespace: kiro-v3
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kiro-v3-allow-engine
  namespace: kiro-v3
spec:
  podSelector:
    matchLabels:
      app: kiro-v3-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
    - from:
        - podSelector:
            matchLabels:
              app: kiro-v3-engine
      ports:
        - protocol: TCP
          port: 50051
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: kiro-v3-engine
      ports:
        - protocol: TCP
          port: 50051
    - to: []
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to: []
      ports:
        - protocol: TCP
          port: 443
    - to: []
      ports:
        - protocol: TCP
          port: 5432
    - to: []
      ports:
        - protocol: TCP
          port: 6379