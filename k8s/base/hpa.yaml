apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kiro-v3-engine-hpa
  namespace: kiro-v3
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kiro-v3-engine
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: kiro_gpu_utilization
        target:
          type: AverageValue
          averageValue: "70"
    - type: External
      external:
        metric:
          name: kiro_queue_depth
          selector:
            matchLabels:
              service: kiro-v3-engine
        target:
          type: AverageValue
          averageValue: "50"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
---
# Custom Metrics for HPA (requires Prometheus Adapter)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-adapter-config
  namespace: kiro-v3
data:
  config.yaml: |
    rules:
      - seriesQuery: 'kiro_gpu_utilization{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
            pod:
              resource: pod
        name:
          matches: "^(.*)_utilization$"
          as: "${1}_utilization"
        metricsQuery: 'avg(<<.Series>>{<<.LabelMatchers>>}) by (<<.GroupBy>>)'
      
      - seriesQuery: 'kiro_queue_depth{namespace!="",pod!=""}'
        resources:
          overrides:
            namespace:
              resource: namespace
            pod:
              resource: pod
        name:
          matches: "^(.*)_depth$"
          as: "${1}_depth"
        metricsQuery: 'avg(<<.Series>>{<<.LabelMatchers>>}) by (<<.GroupBy>>)'