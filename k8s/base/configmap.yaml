apiVersion: v1
kind: ConfigMap
metadata:
  name: kiro-v3-config
  namespace: kiro-v3
data:
  # Actor Model Configuration
  KIRO_ACTOR_SHARD_COUNT: "16"
  KIRO_MAILBOX_MAX_SIZE: "10000"
  KIRO_MAILBOX_BACKPRESSURE: "0.8"
  
  # GPU Configuration
  KIRO_GPU_COUNT: "2"
  KIRO_GPU_MAX_CONCURRENT: "4"
  KIRO_GPU_TOKEN_RATE: "10.0"
  KIRO_GPU_BURST_SIZE: "20"
  
  # LLM Timeout Configuration
  KIRO_LLM_TIMEOUT: "30.0"
  KIRO_LLM_CIRCUIT_THRESHOLD: "5"
  KIRO_LLM_CIRCUIT_RECOVERY: "30.0"
  
  # Retry Configuration
  KIRO_RETRY_MAX_RETRIES: "3"
  KIRO_RETRY_BASE_DELAY: "1.0"
  KIRO_RETRY_MAX_DELAY: "60.0"
  KIRO_RETRY_STRATEGY: "FULL_JITTER"
  
  # Bandit Configuration
  KIRO_BANDIT_EXPLORATION: "2.0"
  KIRO_BANDIT_WARMUP: "5"
  
  # Cache Configuration
  KIRO_CACHE_MAX_SIZE: "10000"
  KIRO_CACHE_TTL: "3600"
  KIRO_CACHE_PREFETCH_PROB: "0.3"
  
  # GC Configuration
  KIRO_GC_FREEZE_ON_BOOT: "true"
  KIRO_GC_FREEZE_DURATION: "300"
  KIRO_GC_BACKGROUND_INTERVAL: "60"
  
  # Metrics Configuration
  KIRO_METRICS_PORT: "9090"
  KIRO_METRICS_MAX_LABEL_VALUES: "100"
  
  # Training Configuration
  KIRO_TRAINING_ENABLED: "false"
  KIRO_TRAINING_MAX_STEPS: "1000"
  KIRO_TRAINING_SAVE_STEPS: "100"
  
  # Chaos Configuration
  KIRO_CHAOS_ENABLED: "false"
  KIRO_CHAOS_FAILURE_RATE: "0.1"
  
  # Logging
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"