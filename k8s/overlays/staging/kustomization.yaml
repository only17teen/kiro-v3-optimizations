apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kiro-v3-staging

namePrefix: staging-

resources:
  - ../../base

commonLabels:
  environment: staging
  tier: backend

commonAnnotations:
  environment: staging
  cost-center: kiro-team

replicas:
  - name: kiro-v3-engine
    count: 2

images:
  - name: ghcr.io/only17teen/kiro-v3-optimizations
    newTag: latest

configMapGenerator:
  - name: kiro-v3-config-overlay
    behavior: merge
    literals:
      - LOG_LEVEL=DEBUG
      - KIRO_CHAOS_ENABLED=true
      - KIRO_CHAOS_FAILURE_RATE=0.05
      - KIRO_GPU_COUNT=1
      - KIRO_RETRY_MAX_RETRIES=3
      - KIRO_CACHE_MAX_SIZE=10000
      - KIRO_TRAINING_ENABLED=false

secretGenerator:
  - name: kiro-v3-secrets-overlay
    behavior: merge
    literals:
      - ENVIRONMENT=staging

patches:
  - target:
      kind: Deployment
      name: kiro-v3-engine
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "8Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/nvidia.com~1gpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/nvidia.com~1gpu
        value: "1"

  - target:
      kind: HorizontalPodAutoscaler
      name: kiro-v3-engine-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5

  - target:
      kind: Ingress
      name: kiro-v3-engine
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: kiro-v3.staging.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: kiro-v3.staging.example.com
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-staging