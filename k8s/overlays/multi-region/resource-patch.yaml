apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-v3
spec:
  template:
    spec:
      containers:
        - name: kiro-v3
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "16Gi"
              cpu: "8"
          env:
            - name: REDIS_CLUSTER_MODE
              value: "true"
            - name: CROSS_REGION_READS
              value: "true"
            - name: GLOBAL_RATE_LIMIT
              value: "10000"
            - name: FAILOVER_TIMEOUT_MS
              value: "5000"
            - name: HEALTH_CHECK_INTERVAL_MS
              value: "2000"
