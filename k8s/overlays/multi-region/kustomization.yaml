apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kiro-v3

resources:
  - ../../base
  - deployment.yaml

namePrefix: multi-region-

commonLabels:
  variant: multi-region
  region: global

replicas:
  - name: kiro-v3
    count: 9

patchesStrategicMerge:
  - resource-patch.yaml

configMapGenerator:
  - name: region-config
    literals:
      - REGION=global
      - FAILOVER_MODE=active-active
      - CROSS_REGION_REPLICATION=true

secretGenerator:
  - name: cross-region-tls
    literals:
      - tls.crt=placeholder
      - tls.key=placeholder
