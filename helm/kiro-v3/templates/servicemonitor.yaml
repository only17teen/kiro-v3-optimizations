{{- if .Values.monitoring.enabled }}
{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kiro-v3.fullname" . }}
  labels:
    {{- include "kiro-v3.labels" . | nindent 4 }}
    {{- if .Values.monitoring.serviceMonitor.additionalLabels }}
    {{- toYaml .Values.monitoring.serviceMonitor.additionalLabels | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "kiro-v3.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
      honorLabels: true
{{- end }}
---
{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "kiro-v3.fullname" . }}
  labels:
    {{- include "kiro-v3.labels" . | nindent 4 }}
    {{- if .Values.monitoring.prometheusRule.additionalLabels }}
    {{- toYaml .Values.monitoring.prometheusRule.additionalLabels | nindent 4 }}
    {{- end }}
spec:
  groups:
    {{- toYaml .Values.monitoring.prometheusRule.groups | nindent 4 }}
{{- end }}
{{- end }}