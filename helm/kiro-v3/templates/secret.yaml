apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kiro-v3.secretName" . }}
  labels:
    {{- include "kiro-v3.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  
  {{- if .Values.secrets.apiKeys.openai }}
  OPENAI_API_KEY: {{ .Values.secrets.apiKeys.openai | quote }}
  {{- end }}
  
  {{- if .Values.secrets.apiKeys.anthropic }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.apiKeys.anthropic | quote }}
  {{- end }}
  
  {{- if .Values.secrets.database.host }}
  DB_HOST: {{ .Values.secrets.database.host | quote }}
  DB_PORT: {{ .Values.secrets.database.port | quote }}
  DB_USER: {{ .Values.secrets.database.user | quote }}
  DB_PASSWORD: {{ .Values.secrets.database.password | quote }}
  DB_NAME: {{ .Values.secrets.database.name | quote }}
  {{- end }}
  
  {{- if .Values.secrets.redis.host }}
  REDIS_HOST: {{ .Values.secrets.redis.host | quote }}
  REDIS_PORT: {{ .Values.secrets.redis.port | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redis.password | quote }}
  {{- end }}
  
  {{- if .Values.secrets.s3.endpoint }}
  S3_ENDPOINT: {{ .Values.secrets.s3.endpoint | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.s3.accessKey | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.s3.secretKey | quote }}
  S3_BUCKET: {{ .Values.secrets.s3.bucket | quote }}
  {{- end }}
  
  {{- if .Values.secrets.alerts.webhookUrl }}
  ALERT_WEBHOOK_URL: {{ .Values.secrets.alerts.webhookUrl | quote }}
  {{- end }}
  
  {{- if .Values.secrets.alerts.pagerdutyKey }}
  PAGERDUTY_KEY: {{ .Values.secrets.alerts.pagerdutyKey | quote }}
  {{- end }}